name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: 'app_sources'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Complete Flutter Skeleton & Merge Files
        run: |
          # 1. إنشاء مشروع فلتر جديد
          flutter create --org com.ruqyah --project-name custom_ruqyah_player workspace_app
          
          # 2. نسخ الملفات الخاصة بك داخل المشروع
          cp -R app_sources/lib workspace_app/
          cp app_sources/pubspec.yaml workspace_app/
          
          # 3. إحلال ملف AndroidManifest إذا وجد
          if [ -f "app_sources/android/app/src/main/AndroidManifest.xml" ]; then
            cp app_sources/android/app/src/main/AndroidManifest.xml workspace_app/android/app/src/main/
          fi

          # 4. تعديل compileSdk إلى 36 بأسلوب يتوافق مع جميع صيغ gradle الحديثة والقديمة
          find workspace_app/android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i 's/compileSdk = .*/compileSdk = 36/g' {} +
          find workspace_app/android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i 's/flutter.compileSdkVersion/36/g' {} +

      - name: Install Project Dependencies
        run: |
          cd workspace_app
          flutter pub get

      - name: Generate Hive Models Adapter
        run: |
          cd workspace_app
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: |
          cd workspace_app
          flutter build apk --release

      - name: Upload APK Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruqyah-app-release
          path: workspace_app/build/app/outputs/flutter-apk/app-release.apk
