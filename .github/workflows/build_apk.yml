name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: 'app_sources'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Workspace and Use Custom Pubspec
        run: |
          # 1. إنشاء هيكل مشروع نظيف
          flutter create --org com.ruqyah --project-name custom_ruqyah_player workspace_app
          
          # 2. نسخ مجلد الكود الخاص بك
          cp -R app_sources/lib workspace_app/
          
          # 3. استخدام ملف pubspec.yaml الخاص بك مباشرة بدلاً من الأوامر العشوائية
          cp app_sources/pubspec.yaml workspace_app/
          
          # 4. إحلال ملف AndroidManifest إذا وجد
          if [ -f "app_sources/android/app/src/main/AndroidManifest.xml" ]; then
            cp app_sources/android/app/src/main/AndroidManifest.xml workspace_app/android/app/src/main/
          fi

          # 5. رفع compileSdk إلى 36 بأسلوب آمن ومتوافق تماماً
          cd workspace_app
          mkdir -p android/app
          echo "android { compileSdkVersion 36 }" >> android/build.gradle || true

      - name: Install Project Dependencies
        run: |
          cd workspace_app
          flutter pub get

      - name: Generate Hive Models Adapter
        run: |
          cd workspace_app
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: |
          cd workspace_app
          flutter build apk --release

      - name: Upload APK Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruqyah-app-release
          path: workspace_app/build/app/outputs/flutter-apk/app-release.apk
