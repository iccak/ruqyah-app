name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: 'app_sources'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Clean Workspace & Force Gradle Fixes
        run: |
          # 1. إنشاء مشروع فلتر حديث ونظيف
          flutter create --org com.ruqyah --project-name custom_ruqyah_player workspace_app
          
          # 2. نسخ ملفات الكود فقط
          cp -R app_sources/lib workspace_app/
          
          # 3. إحلال ملف AndroidManifest
          if [ -f "app_sources/android/app/src/main/AndroidManifest.xml" ]; then
            cp app_sources/android/app/src/main/AndroidManifest.xml workspace_app/android/app/src/main/
          fi

          # 4. تثبيت المكتبات المتوافقة تلقائياً بدون تعارض في الإصدارات
          cd workspace_app
          flutter pub add just_audio audio_service path_provider file_picker hive hive_flutter uuid flutter_localizations --sdk=flutter
          flutter pub add --dev build_runner hive_generator flutter_lints

          # 5. فرض compileSdk 36 على كافة المكتبات المعتمدة
          echo "subprojects { afterEvaluate { project -> if (project.hasProperty('android')) { project.android { compileSdkVersion 36 } } } }" >> android/build.gradle

      - name: Generate Hive Models Adapter
        run: |
          cd workspace_app
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: |
          cd workspace_app
          flutter build apk --release

      - name: Upload APK Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruqyah-app-release
          path: workspace_app/build/app/outputs/flutter-apk/app-release.apk
